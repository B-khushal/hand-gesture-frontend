services:
  - type: static
    name: hand-gesture-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_BACKEND_URL
        value: https://hand-gesture-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
